[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# /api (정확히) → 함수 : 학생앱 JSONP/POST, 리포트 JSONP가 여기로 들어옴
[[redirects]]
  from = "/api"
  to = "/.netlify/functions/proxy"
  status = 200
  force = true

# /api/* (하위 경로) → 함수 : 혹시 모를 경로형 호출도 함수로
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/proxy"
  status = 200
  force = true
